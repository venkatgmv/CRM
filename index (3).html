<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BushWalk Trust - Donor CRM</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(1.3);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #2C5F2D 0%, #97BC62 100%);
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header-branding {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }

        .org-details h1 {
            color: #2C5F2D;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .org-subtitle {
            color: #666;
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 3px;
        }

        .contact-details {
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 11px;
            color: #555;
            line-height: 1.6;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-role {
            background: #2C5F2D;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .btn-logout {
            background: #c53030;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-logout:hover {
            background: #9b2c2c;
        }

        .nav-tabs {
            background: white;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-tab {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.2s;
        }

        .nav-tab:hover {
            background: #edf2f7;
        }

        .nav-tab.active {
            background: #2C5F2D;
            color: white;
        }

        .content-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2C5F2D;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-primary {
            background: #2C5F2D;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #234d24;
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: #c53030;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f7fafc;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px;
            font-size: 14px;
            color: #2d3748;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f7fafc;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-warning {
            background: #feebc8;
            color: #744210;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #2C5F2D 0%, #97BC62 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
        }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .newsletter-preview {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .content-editor {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: #2C5F2D;
            margin-bottom: 30px;
            text-align: center;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .alert-info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        .public-website {
            background: white;
            padding: 40px;
            border-radius: 12px;
        }

        .website-hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #2C5F2D 0%, #97BC62 100%);
            color: white;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .website-hero h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .website-section {
            margin-bottom: 40px;
        }

        .website-section h2 {
            font-size: 24px;
            color: #2C5F2D;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .website-content {
            font-size: 16px;
            line-height: 1.8;
            color: #4a5568;
        }

        .donor-portal {
            max-width: 900px;
            margin: 0 auto;
        }

        .donation-card {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #2C5F2D;
        }

        .donation-card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .project-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2C5F2D;
        }

        .project-card h3 {
            color: #2C5F2D;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ─── CONFIGURATION ──────────────────────────────────────────────────────────
        // ↓↓ REPLACE THIS with your deployed Google Apps Script Web App URL ↓↓
        const SCRIPT_URL = 'YOUR_SCRIPT_URL_HERE';
        // ↑↑ e.g. 'https://script.google.com/macros/s/AKfycb.../exec'       ↑↑

        // Central API helper — all reads/writes go through Apps Script
        const sheetsAPI = async (action, sheet, data = null) => {
            if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_SCRIPT_URL_HERE')
                throw new Error('Script URL not configured. Open bushwalk.html and set SCRIPT_URL at the top of the script.');
            const url = new URL(SCRIPT_URL);
            url.searchParams.set('action', action);
            url.searchParams.set('sheet', sheet);
            if (data) {
                const isUpsert = action === 'upsert' || action === 'upsert_multiple';
                const body = isUpsert
                    ? JSON.stringify({ action, sheet, ...data })
                    : JSON.stringify({ action, sheet, data });
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body,
                    mode: 'no-cors'
                });
                return { success: true };
            }
            const resp = await fetch(url.toString(), { method: 'GET' });
            return await resp.json();
        };

        // Login API — uses GET so we can read the JSON response
        const loginAPI = async (username, password) => {
            if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_SCRIPT_URL_HERE')
                throw new Error('Script URL not configured. Open bushwalk.html and set SCRIPT_URL.');
            const url = new URL(SCRIPT_URL);
            url.searchParams.set('action', 'login');
            url.searchParams.set('username', username.trim().toLowerCase());
            url.searchParams.set('password', password);
            const resp = await fetch(url.toString(), { method: 'GET' });
            return await resp.json();
        };

        // Demo data storage
        const DemoApp = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userRole, setUserRole] = useState('');
            const [loggedInUser, setLoggedInUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [viewMode, setViewMode] = useState('admin');
            const [sheetsStatus, setSheetsStatus] = useState('unchecked');
            const [sheetsMsg, setSheetsMsg] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncLabel, setSyncLabel] = useState('');
            const [dataLoading, setDataLoading] = useState(false);

            // Date formatting helper function
            const formatDateDisplay = (dateStr) => {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                const day = String(date.getDate()).padStart(2, '0');
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                    'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const month = monthNames[date.getMonth()];
                const year = date.getFullYear();
                return `${day}-${month}-${year}`;
            };

            const [donors, setDonors] = useState([]);

            const [donations, setDonations] = useState([]);

            const [newsletters, setNewsletters] = useState([]);

            const [websiteContent, setWebsiteContent] = useState({
                hero: { title: '', subtitle: '' },
                about: { title: '', content: '' },
                projects: []
            });

            const [currentDonor, setCurrentDonor] = useState({
                name: '', email: '', phone: '', address: '', dob: '', anniversary: ''
            });

            const [currentDonation, setCurrentDonation] = useState({
                donorId: '', amount: '', date: '', mode: 'Online', transactionRef: ''
            });

            const [currentNewsletter, setCurrentNewsletter] = useState({
                title: '', description: '', content: ''
            });

            const [searchTerm, setSearchTerm] = useState('');

            // ─── SYNC HELPERS ────────────────────────────────────────────────────────────
            const withSync = async (label, localFn, sheetAction, sheetName, data) => {
                localFn();
                setIsSyncing(true);
                setSyncLabel(label);
                try {
                    await sheetsAPI(sheetAction, sheetName, data);
                    setSheetsStatus('ok');
                    setSheetsMsg('');
                } catch (err) {
                    console.warn('Sheets sync skipped:', err.message);
                    if (SCRIPT_URL && SCRIPT_URL !== 'YOUR_SCRIPT_URL_HERE') {
                        setSheetsStatus('error');
                        setSheetsMsg(err.message);
                    }
                } finally {
                    setIsSyncing(false);
                    setSyncLabel('');
                }
            };

            const loadFromSheets = async () => {
                if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_SCRIPT_URL_HERE') return;
                setDataLoading(true);
                try {
                    const [
                        donorsRes, donationsRes, newslettersRes, paymentsRes,
                        obRes, cbRes, oeRes, ceRes, wcRes, usersRes
                    ] = await Promise.all([
                        sheetsAPI('read', 'Donors'),
                        sheetsAPI('read', 'Donations'),
                        sheetsAPI('read', 'Newsletters'),
                        sheetsAPI('read', 'Payments'),
                        sheetsAPI('read', 'OpexBudget'),
                        sheetsAPI('read', 'CapexBudget'),
                        sheetsAPI('read', 'OpexExpenses'),
                        sheetsAPI('read', 'CapexExpenses'),
                        sheetsAPI('read', 'WebsiteContent'),
                        sheetsAPI('read_users_safe')
                    ]);
                    if (donorsRes.rows) {
                        setDonors(donorsRes.rows.map(r => ({ ...r, id: r.id || ('D' + Date.now() + Math.random()) })));
                    }
                    if (donationsRes.rows) {
                        setDonations(donationsRes.rows.map(r => ({ ...r, id: r.id || ('DN' + Date.now() + Math.random()), donorId: String(r.donorId || ''), amount: parseFloat(r.amount) || 0 })));
                    }
                    if (newslettersRes.rows) {
                        setNewsletters(newslettersRes.rows.map(r => ({ ...r, id: r.id || ('NL' + Date.now() + Math.random()) })));
                    }
                    if (paymentsRes.rows) {
                        setPayments(paymentsRes.rows.map(r => ({ ...r, id: r.id || ('PY' + Date.now() + Math.random()), amount: parseFloat(r.amount) || 0 })));
                    }

                    if (obRes.rows) {
                        const ob = {};
                        const ocats = [];
                        obRes.rows.forEach(r => { ob[r.category] = parseFloat(r.amount) || 0; ocats.push(r.category); });
                        setOpexBudget(ob);
                        if (ocats.length > 0) setOpexCategories([...new Set(ocats)]);
                    }
                    if (cbRes.rows) {
                        const cb = {};
                        const ccats = [];
                        cbRes.rows.forEach(r => { cb[r.category] = parseFloat(r.amount) || 0; ccats.push(r.category); });
                        setCapexBudget(cb);
                        if (ccats.length > 0) setCapexCategories([...new Set(ccats)]);
                    }
                    if (oeRes.rows) {
                        const od = {};
                        oeRes.rows.forEach(r => {
                            if (!od[r.month]) od[r.month] = {};
                            od[r.month][r.category] = parseFloat(r.amount) || 0;
                            setOpexCategories(prev => prev.includes(r.category) ? prev : [...prev, r.category]);
                        });
                        setOpexData(od);
                    }
                    if (ceRes.rows) {
                        const cd = {};
                        ceRes.rows.forEach(r => {
                            if (!cd[r.month]) cd[r.month] = {};
                            cd[r.month][r.category] = parseFloat(r.amount) || 0;
                            setCapexCategories(prev => prev.includes(r.category) ? prev : [...prev, r.category]);
                        });
                        setCapexData(cd);
                    }
                    if (wcRes.rows) {
                        const wc = { hero: { title: '', subtitle: '' }, about: { title: '', content: '' }, projects: [] };
                        wcRes.rows.forEach(r => {
                            if (r.section === 'hero' || r.section === 'about') {
                                wc[r.section][r.key] = r.value;
                            } else if (r.section === 'projects' && r.key === 'data') {
                                try { wc.projects = JSON.parse(r.value); } catch (e) { console.warn("Failed to parse projects json"); }
                            }
                        });
                        if (wcRes.rows.length > 0) {
                            setWebsiteContent(wc);
                        }
                    }
                    if (usersRes?.rows) {
                        setUsers(usersRes.rows.map(u => {
                            let perms = {};
                            try { perms = typeof u.permissions === 'string' ? JSON.parse(u.permissions) : u.permissions || {}; } catch (e) { }

                            // Fill missing default permissions
                            const defaultGrid = { view: false, edit: false };
                            const defaultPermissions = {
                                dashboard: { ...defaultGrid, ...perms.dashboard },
                                expenditure: { ...defaultGrid, ...perms.expenditure },
                                donors: { ...defaultGrid, ...perms.donors },
                                donations: { ...defaultGrid, ...perms.donations },
                                newsletters: { ...defaultGrid, ...perms.newsletters },
                                automation: { ...defaultGrid, ...perms.automation },
                                website: { ...defaultGrid, ...perms.website },
                                donorPortal: { ...defaultGrid, ...perms.donorPortal },
                                payments: { ...defaultGrid, ...perms.payments },
                                userAdmin: { ...defaultGrid, ...perms.userAdmin }
                            };
                            return { ...u, permissions: defaultPermissions };
                        }));
                    }

                    setSheetsStatus('ok');
                    setSheetsMsg('');
                } catch (err) {
                    console.warn('Could not load from Sheets:', err.message);
                    setSheetsStatus('error');
                    setSheetsMsg(err.message);
                } finally {
                    setDataLoading(false);
                }
            };

            const deleteFromSheets = async (sheetName, id) => {

                    await sheetsAPI('delete', sheetName, { id });

                    console.warn('Sheets delete skipped:', err.message);
                }
            };

            // Expenditure state
            const [opexCategories, setOpexCategories] = useState([]);

                                [month]: { ...(prev[month] || {}), [category]: numAmount }

                        } else {
                            setCapexData(prev => ({

                                [month]: { ...(prev[month] || {}), [category]: numAmount }

                    'upsert', sheetName, { matchKeys, data: { month, category, amount: numAmount } }

                    [module]: {

                    }

                const updatePayload = {
                    id: userId,
                    permissions: JSON.stringify(updatedPermissions)
                };

                    'Updating permissions...',
                    () => {

                        onBlur={commit}

                        <div className="stat-card">
                            <div className="stat-label">Messages Sent (This Month)</div>
                            <div className="stat-value">{messagesSentThisMonth}</div>
                        </div>
                    </div>

                    <h3 className="section-title">Upcoming Birthdays</h3>
                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Date of Birth</th>
                                    <th>Days Until</th>
                                </tr>
                            </thead>
                            <tbody>
                                {upcomingBirthdays.length > 0 ? upcomingBirthdays.map(donor => {
                                    const dob = new Date(donor.dob);
                                    const nextBday = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
                                    const daysUntil = Math.ceil((nextBday - today) / (1000 * 60 * 60 * 24));
                                    return (
                                        <tr key={donor.id}>
                                            <td>{donor.name}</td>
                                            <td>{donor.email}</td>
                                            <td>{formatDateDisplay(donor.dob)}</td>
                                            <td>{daysUntil} days</td>
                                        </tr>
                                    );
                                }) : (
                                    <tr><td colSpan="4" style={{ textAlign: 'center' }}>No upcoming birthdays in the next 30 days</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </>
            );
        };

        const WebsiteContentTab = ({ content, setContent, userRole, withSync }) => {
            const [editMode, setEditMode] = useState(false);
            const [editContent, setEditContent] = useState(content);

            const handleSave = () => {
                const sheetData = [
                    { matchKeys: { section: 'hero', key: 'title' }, data: { section: 'hero', key: 'title', value: editContent.hero.title } },
                    { matchKeys: { section: 'hero', key: 'subtitle' }, data: { section: 'hero', key: 'subtitle', value: editContent.hero.subtitle } },
                    { matchKeys: { section: 'about', key: 'title' }, data: { section: 'about', key: 'title', value: editContent.about.title } },
                    { matchKeys: { section: 'about', key: 'content' }, data: { section: 'about', key: 'content', value: editContent.about.content } },
                    // Save projects as a stringified JSON blob in a single row
                    { matchKeys: { section: 'projects', key: 'data' }, data: { section: 'projects', key: 'data', value: JSON.stringify(editContent.projects) } }
                ];

                withSync(
                    'Saving Content...',
                    () => {
                        setContent(editContent);
                        setEditMode(false);
                        alert('Website content updated successfully!');
                    },
                    'upsert_multiple', 'WebsiteContent', sheetData
                );
            };

            return (
                <>
                    <h2 className="section-title">Website Content Management</h2>

                    {userRole === 'admin' && (
                        <div style={{ marginBottom: '20px' }}>
                            {!editMode ? (
                                <button className="btn-primary" onClick={() => setEditMode(true)}>Edit Content</button>
                            ) : (
                                <>
                                    <button className="btn-secondary" onClick={handleSave} style={{ marginRight: '10px' }}>Save Changes</button>
                                    <button className="btn-danger" onClick={() => setEditMode(false)}>Cancel</button>
                                </>
                            )}
                        </div>
                    )}

                    {editMode ? (
                        <>
                            <div className="form-group">
                                <label>Hero Title</label>
                                <input
                                    type="text"
                                    value={editContent.hero.title}
                                    onChange={(e) => setEditContent({
                                        ...editContent,
                                        hero: { ...editContent.hero, title: e.target.value }
                                    })}
                                />
                            </div>
                            <div className="form-group">
                                <label>Hero Subtitle</label>
                                <input
                                    type="text"
                                    value={editContent.hero.subtitle}
                                    onChange={(e) => setEditContent({
                                        ...editContent,
                                        hero: { ...editContent.hero, subtitle: e.target.value }
                                    })}
                                />
                            </div>
                            <div className="form-group">
                                <label>About Section Title</label>
                                <input
                                    type="text"
                                    value={editContent.about.title}
                                    onChange={(e) => setEditContent({
                                        ...editContent,
                                        about: { ...editContent.about, title: e.target.value }
                                    })}
                                />
                            </div>
                            <div className="form-group">
                                <label>About Section Content</label>
                                <textarea
                                    value={editContent.about.content}
                                    onChange={(e) => setEditContent({
                                        ...editContent,
                                        about: { ...editContent.about, content: e.target.value }
                                    })}
                                    style={{ minHeight: '120px' }}
                                />
                            </div>

                            {/* ── Projects Editor ── */}
                            <div style={{ marginTop: '30px', borderTop: '2px solid #e2e8f0', paddingTop: '20px' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                                    <h3 style={{ fontSize: '16px', fontWeight: '600', color: '#2d3748' }}>Projects</h3>
                                    <button
                                        className="btn-primary btn-small"
                                        onClick={() => setEditContent({
                                            ...editContent,
                                            projects: [
                                                ...editContent.projects,
                                                { id: 'proj_' + Date.now(), name: '', description: '' }
                                            ]
                                        })}
                                    >+ Add Project</button>
                                </div>

                                {editContent.projects.length === 0 && (
                                    <p style={{ color: '#a0aec0', fontSize: '14px', fontStyle: 'italic' }}>No projects yet. Click "+ Add Project" to create one.</p>
                                )}

                                {editContent.projects.map((project, idx) => (
                                    <div key={project.id} style={{ background: '#f7fafc', border: '1px solid #e2e8f0', borderRadius: '8px', padding: '16px', marginBottom: '12px', borderLeft: '4px solid #2C5F2D' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                                            <span style={{ fontSize: '13px', fontWeight: '600', color: '#4a5568' }}>Project {idx + 1}</span>
                                            <button
                                                className="btn-danger"
                                                onClick={() => setEditContent({
                                                    ...editContent,
                                                    projects: editContent.projects.filter((_, i) => i !== idx)
                                                })}
                                            >Remove</button>
                                        </div>
                                        <div className="form-group" style={{ marginBottom: '10px' }}>
                                            <label>Project Name</label>
                                            <input
                                                type="text"
                                                value={project.name}
                                                placeholder="e.g. Backwater Greening Initiative"
                                                onChange={(e) => {
                                                    const updated = editContent.projects.map((p, i) =>
                                                        i === idx ? { ...p, name: e.target.value } : p
                                                    );
                                                    setEditContent({ ...editContent, projects: updated });
                                                }}
                                            />
                                        </div>
                                        <div className="form-group">
                                            <label>Description</label>
                                            <textarea
                                                value={project.description}
                                                placeholder="Describe what this project does..."
                                                style={{ minHeight: '80px' }}
                                                onChange={(e) => {
                                                    const updated = editContent.projects.map((p, i) =>
                                                        i === idx ? { ...p, description: e.target.value } : p
                                                    );
                                                    setEditContent({ ...editContent, projects: updated });
                                                }}
                                            />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    ) : (
                        <div className="content-editor">
                            <div className="website-hero">
                                <h1>{content.hero.title}</h1>
                                <p>{content.hero.subtitle}</p>
                            </div>
                            <div className="website-section">
                                <h2>{content.about.title}</h2>
                                <div className="website-content">{content.about.content}</div>
                            </div>
                            <div className="website-section">
                                <h2>Our Projects</h2>
                                {content.projects.map(project => (
                                    <div key={project.id} className="project-card">
                                        <h3>{project.name}</h3>
                                        <p>{project.description}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </>
            );
        };

        const DonorPortalTab = ({ donations, donors, formatDateDisplay }) => {
            const [selectedDonor, setSelectedDonor] = useState('');

            const donorDonations = selectedDonor
                ? donations.filter(d => String(d.donorId) === String(selectedDonor))
                : [];

            const totalContributed = donorDonations.reduce((sum, d) => sum + parseFloat(d.amount), 0);

            return (
                <div className="donor-portal">
                    <h2 className="section-title">Donor Portal</h2>

                    <div className="alert alert-info">
                        <strong>For Donors:</strong> Select your name to view your donation history and track contributions
                    </div>

                    <div className="form-group">
                        <label>Select Your Name</label>
                        <select
                            value={selectedDonor}
                            onChange={(e) => setSelectedDonor(e.target.value)}
                        >
                            <option value="">Choose your name</option>
                            {donors.map(donor => (
                                <option key={donor.id} value={donor.id}>{donor.name}</option>
                            ))}
                        </select>
                    </div>

                    {selectedDonor && (
                        <>
                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-label">Total Contributions</div>
                                    <div className="stat-value">₹{totalContributed.toLocaleString()}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Number of Donations</div>
                                    <div className="stat-value">{donorDonations.length}</div>
                                </div>
                            </div>

                            <h3 className="section-title">Your Donation History</h3>
                            {donorDonations.map(donation => (
                                <div key={donation.id} className="donation-card">
                                    <div className="donation-card-header">
                                        <strong>Receipt: {donation.receiptId}</strong>
                                        <span className="badge badge-success">{donation.status}</span>
                                    </div>
                                    <div style={{ fontSize: '14px', color: '#4a5568' }}>
                                        <div>Amount: ₹{donation.amount.toLocaleString()}</div>
                                        <div>Date: {formatDateDisplay(donation.date)}</div>
                                        <div>Mode: {donation.mode}</div>
                                    </div>
                                </div>
                            ))}
                        </>
                    )}
                </div>
            );
        };

        const PublicWebsite = ({ content, onBackToLogin }) => (
            <div className="app-container">
                <div className="public-website">
                    <div style={{ textAlign: 'right', marginBottom: '20px' }}>
                        <button className="btn-primary" onClick={onBackToLogin}>Admin Login</button>
                    </div>

                    <div className="website-hero">
                        <h1>{content.hero.title}</h1>
                        <p style={{ fontSize: '18px', marginTop: '10px' }}>{content.hero.subtitle}</p>
                    </div>

                    <div className="website-section">
                        <h2>{content.about.title}</h2>
                        <div className="website-content">{content.about.content}</div>
                    </div>

                    <div className="website-section">
                        <h2>Our Projects</h2>
                        {content.projects.map(project => (
                            <div key={project.id} className="project-card">
                                <h3>{project.name}</h3>
                                <p>{project.description}</p>
                            </div>
                        ))}
                    </div>

                    <div className="website-section">
                        <h2>Support Our Mission</h2>
                        <div className="website-content">
                            <p>Your generous contributions help us green our backwaters, protect biodiversity, and create a healthier environment for current and future generations. Together, we have planted over 8,000 saplings, created habitats for 149 species, and restored our precious water bodies.</p>
                            <button className="btn-primary" style={{ marginTop: '20px' }} onClick={onBackToLogin}>
                                Make a Donation
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        );

        ReactDOM.render(<DemoApp />, document.getElementById('root'));
    </script>
</body>

</html>
